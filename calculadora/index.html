<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <script src="https://kit.fontawesome.com/9215fe2f52.js" crossorigin="anonymous"></script>
</head>
<body>
    <main class="d-flex flex-column justify-content-center align-items-center vw-100 vh-100">
        <div class="container d-flex flex-column">
            <div id="led" class=""></div>
            <div class="display">
                <p class="calc"></p>
            </div>
            <div class="buttonsContainer">
                <div class="row">
                    <button class="button" id="mrc">MRC</button>
                    <button class="button" id="m-">M-</button>
                    <button class="button" id="m+">M+</button>
                    <button class="button" id="operator">✓</button>
                    <button class="button" id="off">OFF</button>
                </div>
                <div class="row row2">
                    <button class="button" id="ac">AC</button>
                    <button class="button" id="c">C</button>
                    <button class="button" id="operator">+/-</button>
                    <button class="button" id="operator">%</button>
                </div>
                <div class="row row2">
                    <button class="button" id="operator">7</button>
                    <button class="button" id="operator">8</button>
                    <button class="button" id="operator">9</button>
                    <button class="button" id="operator">/</button>
                </div>
                <div class="row row2">
                    <button class="button" id="operator">4</button>
                    <button class="button" id="operator">5</button>
                    <button class="button" id="operator">6</button>
                    <button class="button" id="operator">x</button>
                </div>
                <div class="row row2">
                    <button class="button" id="operator">1</button>
                    <button class="button" id="operator">2</button>
                    <button class="button" id="operator">3</button>
                    <button class="button" id="operator">-</button>
                </div>
                <div class="row row2">
                    <button class="button" id="operator">0</button>
                    <button class="button" id="operator">.</button>
                    <button class="button" id="=">=</button>
                    <button class="button" id="operator">+</button>
                </div>
            </div>
            <button class="history" data-modal="modal-1">Histórico da Calculadora</button>
        </div>
    </main>
    <dialog id="modal-1">
        <nav>
            <h3>Histórico da Calculadora</h3>
            <button class="button">X</button>
        </nav>
        <section>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 36 / 92 = 20325</p>
            <p>1 + 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
        </section>
    </dialog>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
