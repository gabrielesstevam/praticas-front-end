<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="https://kit.fontawesome.com/9215fe2f52.js" crossorigin="anonymous"></script>
</head>
<body>
    <main>
        <div class="content">
            <div class="calcul">
                <p class="text">1 + 2 x 43 / 2= 2323215ffffffffffffffff12512</p>
            </div>
            
            <div class="buttonsContainer">
                <div class="fx1">
                    <button class="buttons" id="mrc">MRC</button>
                    <button class="buttons" id="m-">M-</button>
                    <button class="buttons" id="m+">M+</button>
                    <button class="buttons" id="raiz"><i class="fa-solid fa-square-root-variable"></i></button>
                    <button class="buttons" id="off">OFF</button>
                </div>
                <div class="fx2">
                    <button class="buttons" id="ac">AC</button>
                    <button class="buttons" id="c">C</button>
                    <button class="buttons" id="+-">+/-</button>
                    <button class="buttons" id="%">%</button>
                </div>
                <div class="fx3">
                    <button class="buttons" id="7">7</button>
                    <button class="buttons" id="8">8</button>
                    <button class="buttons" id="9">9</button>
                    <button class="buttons" id="//">//</button>
                </div>
                <div class="fx4">
                    <button class="buttons" id="4">4</button>
                    <button class="buttons" id="5">5</button>
                    <button class="buttons" id="6">6</button>
                    <button class="buttons" id="x">X</button>
                </div>
                <div class="fx5">
                    <button class="buttons" id="4">1</button>
                    <button class="buttons" id="5">2</button>
                    <button class="buttons" id="6">3</button>
                    <button class="buttons" id="x">-</button>
                </div>
                <div class="fx5">
                    <button class="buttons" id="4">1</button>
                    <button class="buttons" id="5">2</button>
                    <button class="buttons" id="6">3</button>
                    <button class="buttons" id="x">-</button>
                </div>
                <!--
                AC -> C -> +/- -> %
                7 8 9 //
                4 5 6 X
                1 2 3 -
                0 . = +
                -->

            </div>
        </div>
    </main>
    <script type="module" src="main.js"></script>
</body>
</html>
