<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <script src="https://kit.fontawesome.com/9215fe2f52.js" crossorigin="anonymous"></script>
</head>
<body>
    <main class="d-flex flex-column justify-content-center align-items-center vw-100 vh-100">
        <div class="container d-flex flex-column">
            <div class="led on"></div>
            <div class="display">
                <p class="calc">1 + 2 x 43 / 2</p>
            </div>
            <div class="buttonsContainer">
                <div class="row">
                    <button class="button" id="mrc">MRC</button>
                    <button class="button" id="m-">M-</button>
                    <button class="button" id="m+">M+</button>
                    <button class="button" id="raiz"><i class="fa-solid fa-square-root-variable"></i></button>
                    <button class="button" id="off">OFF</button>
                </div>
                <div class="row row2">
                    <button class="button" id="ac">AC</button>
                    <button class="button" id="c">C</button>
                    <button class="button" id="+-">+/-</button>
                    <button class="button" id="%">%</button>
                </div>
                <div class="row row2">
                    <button class="button" id="7">7</button>
                    <button class="button" id="8">8</button>
                    <button class="button" id="9">9</button>
                    <button class="button" id="/">/</button>
                </div>
                <div class="row row2">
                    <button class="button" id="4">4</button>
                    <button class="button" id="5">5</button>
                    <button class="button" id="6">6</button>
                    <button class="button" id="x">X</button>
                </div>
                <div class="row row2">
                    <button class="button" id="1">1</button>
                    <button class="button" id="2">2</button>
                    <button class="button" id="3">3</button>
                    <button class="button" id="-">-</button>
                </div>
                <div class="row row2">
                    <button class="button" id="0">0</button>
                    <button class="button" id=".">.</button>
                    <button class="button" id="=">=</button>
                    <button class="button" id="+">+</button>
                </div>
            </div>
            <button class="history" data-modal="modal-1">Histórico da Calculadora</button>
        </div>
    </main>
    <dialog id="modal-1">
        <nav>
            <h3>Histórico da Calculadora</h3>
            <button class="button">X</button>
        </nav>
        <section>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 36 / 92 = 20325</p>
            <p>1 + 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
            <p>1 x 3 / 92 = 20325</p>
        </section>
    </dialog>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
